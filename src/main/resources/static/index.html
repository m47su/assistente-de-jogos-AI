<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Junimo.ai</title>

    <style>
      :root {
        --wood-dark: #7a431f;
        --wood: #9f5d2f;
        --wood-light: #c9894f;
        --panel-shadow: #623314;
        --ink: #4f2d18;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      /* FUNDO */
      body {
        font-family: "Trebuchet MS", "Verdana", sans-serif;
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;

        background:
          radial-gradient(circle, rgba(255, 255, 255, 0.9) 1px, transparent 2px)
            0 0 / 100px 100px,
          radial-gradient(
              circle,
              rgba(255, 255, 255, 0.6) 1.5px,
              transparent 3px
            )
            50px 50px / 140px 140px,
          radial-gradient(circle, rgba(255, 255, 255, 0.4) 2px, transparent 4px)
            25px 25px / 180px 180px,
          linear-gradient(to bottom, #082567 0%, #1e5ecf 50%, #6ec1ff 100%);
      }

      /* ☁️ NUVENS */
      .clouds-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .cloud {
        position: absolute;
        opacity: 0.95;
        animation: floatCloud 80s linear infinite;
      }

      .cloud img {
        width: 100%;
        image-rendering: pixelated;
      }

      @keyframes floatCloud {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-200px);
        }
      }

      .cloud-9 {
        top: 60px;
        left: 400px;
        width: 300px;
      }
      .cloud-10 {
        top: 80px;
        right: 300px;
        width: 200px;
      }
      .cloud-11 {
        top: 220px;
        left: 50px;
        width: 400px;
      }
      .cloud-12 {
        top: 200px;
        right: 90px;
        width: 250px;
      }
      .cloud-13 {
        bottom: 100px;
        left: 300px;
        width: 390px;
      }
      .cloud-14 {
        bottom: 250px;
        right: 120px;
        width: 300px;
      }
      .cloud-15 {
        bottom: 60px;
        left: 60%;
        width: 250px;
      }
      .cloud-16 {
        top: 80px;
        right: 40%;
        width: 200px;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 900px;
      }

      .brand {
        font-size: 2rem;
        font-weight: 900;
        color: #f7e6b7;
        text-shadow: 2px 2px 0 #7a431f;
      }

      .panel-title {
        font-size: 2.8rem;
        margin: 20px 0 40px;
        color: #f6d28e;
        text-shadow: 3px 3px 0 #7a431f;
      }

      /* 🎮 JOGOS */
      .games {
        display: flex;
        justify-content: center;
        gap: 40px;
        flex-wrap: wrap;
      }

      .game-btn {
        text-decoration: none;
        color: inherit;
      }

      .game-card {
        position: relative;

        background: linear-gradient(to bottom, #f5e1b8, #eed2a0);

        border: 4px solid #7a431f;
        border-radius: 14px;

        padding: 16px 12px;

        box-shadow:
          inset 0 0 0 3px #8a5227,
          0 6px 0 #623314;

        transition: 0.2s ease;

        width: 180px;
        height: 170px;
      }
      .game-card::before {
        content: "";
        position: absolute;
        top: -8px;
        left: 8px;

        width: 22px;
        height: 22px;

        background: radial-gradient(circle at 30% 30%, #88b954, #4d6f2f);
        border-radius: 0 14px 0 14px;
      }
      .game-btn:hover .game-card {
        transform: translateY(-6px);
      }

      .game-btn:active .game-card {
        transform: translateY(2px);
        box-shadow:
          inset 0 0 0 3px #8a5227,
          0 2px 0 #623314;
      }
      .game-name {
        color: #4f2d18;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .game-card:hover {
        transform: translateY(-6px);
      }

      .game-card:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 var(--panel-shadow);
      }

      .game-name {
        color: #31251b;
        font-size: 1rem;
        margin-bottom: 10px;
      }

      .game-thumb {
        width: 70px;
        height: 90px;
        object-fit: contain;
      }

      /* TEXTO FINAL */
      .footer-text {
        margin-top: 30px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <!-- ☁️ NUVENS -->
    <div class="clouds-layer">
      <div class="cloud cloud-9"><img src="images/cloud.png" /></div>
      <div class="cloud cloud-10"><img src="images/cloud.png" /></div>
      <div class="cloud cloud-11"><img src="images/cloud.png" /></div>
      <div class="cloud cloud-12"><img src="images/cloud.png" /></div>
      <div class="cloud cloud-13"><img src="images/cloud.png" /></div>
      <div class="cloud cloud-14"><img src="images/cloud.png" /></div>
      <div class="cloud cloud-15"><img src="images/cloud.png" /></div>
      <div class="cloud cloud-16"><img src="images/cloud.png" /></div>
    </div>

    <main class="container">
      <h1 class="brand">junimo.ai</h1>
      <h2 class="panel-title">Selecione seu jogo</h2>

      <div class="games">
        <a href="chat.html" onclick="selectGame('stardew')" class="game-btn">
          <div class="game-card">
            <div class="game-name">Stardew Valley</div>
            <img class="game-thumb" src="images/galinha.png" />
          </div>
        </a>

        <a href="chat.html" onclick="selectGame('minecraft')" class="game-btn">
          <div class="game-card">
            <div class="game-name">Minecraft</div>
            <img class="game-thumb" src="images/steve.jpg" />
          </div>
        </a>

        <a href="chat.html" onclick="selectGame('terraria')" class="game-btn">
          <div class="game-card">
            <div class="game-name">Terraria</div>
            <img class="game-thumb" src="images/terrariahum.png" />
          </div>
        </a>
      </div>

      <div class="footer-text">
        Escolha um universo e converse com a IA no estilo do seu jogo.
      </div>
    </main>

    <script>
      function selectGame(game) {
        localStorage.setItem("selectedGame", game);
      }
    </script>
  </body>
</html>

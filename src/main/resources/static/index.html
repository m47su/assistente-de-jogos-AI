<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Wiki AI Selector</title>
    <style>
      :root {
        --bg-deep: #0a0b1e;
        --accent-purple: #4b1d8d;
        --glass: rgba(255, 255, 255, 0.05);
      }
      body {
        background: radial-gradient(
          circle at center,
          #1a1b3a 0%,
          var(--bg-deep) 100%
        );
        color: white;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      .grid {
        display: flex;
        gap: 30px;
        margin-top: 40px;
      }
      .card {
        background: var(--glass);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 20px;
        width: 180px;
        text-align: center;
        cursor: pointer;
        transition: 0.4s;
        backdrop-filter: blur(10px);
      }
      .card:hover {
        transform: translateY(-15px);
        background: var(--accent-purple);
        box-shadow: 0 0 30px rgba(125, 95, 255, 0.4);
      }
      h1 {
        font-weight: 300;
        letter-spacing: 2px;
      }
      .icon {
        font-size: 50px;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <h1>ESCOLHA SEU MUNDO</h1>
    <div class="grid">
      <div class="card" onclick="startChat('Stardew Valley')">
        <div class="icon">👨‍🌾</div>
        <h3>Stardew Valley</h3>
      </div>
      <div class="card" onclick="startChat('Minecraft')">
        <div class="icon">🧱</div>
        <h3>Minecraft</h3>
      </div>
      <div class="card" onclick="startChat('Terraria')">
        <div class="icon">🌳</div>
        <h3>Terraria</h3>
      </div>
    </div>

    <script>
      function startChat(game) {
        localStorage.setItem("selectedGame", game);
        window.location.href = "chat.html";
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>junimo.ai</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar-icons">
        <div class="logo-text">.junimo.ai</div>

        <div class="icon-menu">
          <button class="icon-button" aria-label="Perfil">
            <span>👤</span>
          </button>

          <button class="icon-button" aria-label="Favoritos">
            <span>★</span>
          </button>

          <button class="icon-button" aria-label="Recentes">
            <span>⏱</span>
          </button>

          <button class="icon-button" aria-label="Arquivos">
            <span>🗒</span>
          </button>

          <button class="icon-button" aria-label="Configurações">
            <span>⚙</span>
          </button>
        </div>
      </aside>

      <main class="chat-layout">
        <section class="chat-list-panel">
          <h2 class="panel-title">seus chats</h2>

          <div class="chat-group">
            <h3 class="group-title">fixados</h3>
            <div class="chat-card"></div>
          </div>

          <div class="chat-group">
            <h3 class="group-title">hoje</h3>
            <div class="chat-card"></div>
            <div class="chat-card"></div>
            <div class="chat-card"></div>
            <div class="chat-card"></div>
          </div>
        </section>

        <section class="chat-panel">
          <h2 class="panel-title">novo chat</h2>

          <div class="messages-area" id="messagesArea"></div>

          <form class="chat-input-area" id="chatForm">
            <input
              type="text"
              id="messageInput"
              class="chat-input"
              placeholder="me pergunte qualquer coisa..."
              autocomplete="off"
            />
            <button type="submit" class="send-button" aria-label="Enviar">
              <span>▶</span>
            </button>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>

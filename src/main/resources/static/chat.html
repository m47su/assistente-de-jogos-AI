<!doctype html>
<html lang="pt-br">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <meta charset="UTF-8" />
    <title>Wiki AI Chat</title>
    <style>
      body {
        background: #0a0b1e;
        color: white;
        font-family: "Inter", sans-serif;
        display: flex;
        height: 100vh;
        margin: 0;
        font-family:
          "Segoe UI Emoji", "Segoe UI Symbol", "Apple Color Emoji", sans-serif;
      }
      /* Sidebar estilo Gemini */
      .sidebar {
        width: 260px;
        background: #050510;
        border-right: 1px solid #1a1b3a;
        display: flex;
        flex-direction: column;
        padding: 20px;
      }
      .history-item {
        padding: 10px;
        border-radius: 8px;
        font-size: 14px;
        color: #aaa;
        cursor: pointer;
        margin-bottom: 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .history-item:hover {
        background: #1a1b3a;
        color: white;
      }

      /* Área Principal */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      #chat-window {
        flex: 1;
        overflow-y: auto;
        padding: 40px 20%;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* Balões de Chat */
      .message {
        max-width: 80%;
        padding: 15px;
        border-radius: 15px;
        line-height: 1.5;
      }
      .message p {
        margin: 5px 0;
      }
      .message ul,
      .message ol {
        padding-left: 20px;
      }
      .user {
        align-self: flex-end;
        background: #4b1d8d;
        color: white;
        border-bottom-right-radius: 2px;
      }
      .ai {
        align-self: flex-start;
        background: #1a1b3a;
        border-bottom-left-radius: 2px;
      }

      /* Barra de Input */
      .input-area {
        padding: 20px 20%;
        background: #0a0b1e;
      }
      .input-box {
        background: #1a1b3a;
        border-radius: 25px;
        padding: 15px 25px;
        display: flex;
        border: 1px solid #2d2d4d;
      }
      input {
        background: none;
        border: none;
        color: white;
        flex: 1;
        outline: none;
        font-size: 16px;
      }
      button {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 20px;
        color: #7d5fff;
      }

      .thinking {
        font-style: italic;
        color: #7d5fff;
        opacity: 0.7;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.4;
        }
      }
      .suggestion-box {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .suggestion-btn {
        background: rgba(125, 95, 255, 0.1);
        border: 1px border #4b1d8d;
        color: #ccc;
        padding: 8px;
        border-radius: 5px;
        font-size: 12px;
        cursor: pointer;
        text-align: left;
        transition: 0.3s;
      }
      .suggestion-btn:hover {
        background: #4b1d8d;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <button
        onclick="window.location.href = 'index.html'"
        style="
          color: white;
          background: none;
          border: 1px solid #4b1d8d;
          border-radius: 5px;
          cursor: pointer;
          margin-bottom: 20px;
        "
      >
        ← Voltar
      </button>
      <h3 id="game-title" style="color: #7d5fff; margin-bottom: 20px">Mundo</h3>
      <button
        onclick="startNewChat()"
        style="
          width: 100%;
          background: #4b1d8d;
          color: white;
          padding: 10px;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          margin-bottom: 10px;
          font-size: 1rem;
          text-align: center;
        "
      >
        + Nova Conversa
      </button>
      <div
        class="suggestion-box"
        id="suggestions"
        style="margin-top: 30px"
      ></div>

      <div class="sidebar-section">
        <p style="font-size: 12px; color: #7d5fff; font-weight: bold">
          CONVERSAS RECENTES
        </p>
        <div id="history-list"></div>
      </div>

      <div class="sidebar-section" style="margin-top: 30px">
        <p style="font-size: 12px; color: #ff9f43; font-weight: bold">
          🔔 LEMBRETES
        </p>
        <div id="reminders-list" style="font-size: 13px; color: #ccc"></div>
      </div>
    </div>

    <div class="main">
      <div id="chat-window"></div>
      <div class="input-area">
        <div class="input-box">
          <input
            type="text"
            id="user-input"
            placeholder="Pergunte algo à Wiki..."
          />
          <button onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>

    <script>
      let currentSessionId =
        localStorage.getItem("chatSessionId") || crypto.randomUUID();
      localStorage.setItem("chatSessionId", currentSessionId);
      let chatSessionsData = {};

      const selectedGame = localStorage.getItem("selectedGame");
      if (!selectedGame) window.location.href = "index.html";
      document.getElementById("game-title").innerText = selectedGame;

      function startNewChat() {
        currentSessionId = crypto.randomUUID();
        localStorage.setItem("chatSessionId", currentSessionId);
        document.getElementById("chat-window").innerHTML = "";
        loadHistory();
      }

      async function sendMessage() {
        const input = document.getElementById("user-input");
        const message = input.value;
        if (!message) return;

        addMessageToChat("user", message);
        input.value = "";

        const chatWindow = document.getElementById("chat-window");
        const thinkingBubble = document.createElement("div");
        thinkingBubble.className = "message ai thinking";
        thinkingBubble.innerText = "Pensando...";
        chatWindow.appendChild(thinkingBubble);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
          const response = await fetch("/api/assistant", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              game: selectedGame,
              message: message,
              sessionId: currentSessionId,
            }),
          });

          thinkingBubble.remove();
          const text = await response.text();
          addMessageToChat("ai", text);
          loadReminders();
          loadHistory();
        } catch (error) {
          thinkingBubble.innerText =
            "Erro ao conectar com a Wiki. Tente novamente!";
          console.error(error);
        }
      }

      function addMessageToChat(type, text) {
        const win = document.getElementById("chat-window");
        const div = document.createElement("div");
        div.className = `message ${type}`;

        div.innerHTML = marked.parse(text);

        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
      }
      // Detecta a tecla Enter no campo de input
      document
        .getElementById("user-input")
        .addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            sendMessage();
          }
        });

      async function loadSuggestions() {
        const box = document.getElementById("suggestions");
        box.innerHTML =
          '<p style="font-size: 12px; color: #7d5fff;">Gerando ideias...</p>';

        try {
          const response = await fetch(
            `/api/assistant/suggestions?game=${selectedGame}`,
          );
          const questions = await response.json();

          box.innerHTML =
            '<p style="font-size: 12px; color: #7d5fff; margin-bottom: 5px;">Sugestões da IA:</p>';
          questions.forEach((q) => {
            const btn = document.createElement("div");
            btn.className = "suggestion-btn";
            btn.innerText = q.trim();
            btn.onclick = () => {
              document.getElementById("user-input").value = q.trim();
              sendMessage();
            };
            box.appendChild(btn);
          });
        } catch (e) {
          box.innerHTML = "<p>Erro ao carregar sugestões.</p>";
        }
      }

      async function loadHistory() {
        const res = await fetch(`/api/assistant/history?game=${selectedGame}`);
        if (!res.ok) return;
        const data = await res.json();
        const list = document.getElementById("history-list");

        // Agrupamos as mensagens por sessionId para não repetir na barra lateral
        const sessions = {};
        data.forEach((m) => {
          if (!sessions[m.sessionId]) {
            sessions[m.sessionId] = m.userMessage; // Usa a 1ª pergunta como título
          }
        });

        list.innerHTML = Object.keys(sessions)
          .map(
            (sid) => `
        <div class="history-item" onclick="loadFullChat('${sid}')" title="${sessions[sid]}">
            ${sessions[sid]}
        </div>
    `,
          )
          .join("");
      }

      async function loadFullChat(sid) {
        // Quando clicamos, essa sessão vira a sessão "ativa"
        currentSessionId = sid;
        localStorage.setItem("chatSessionId", sid);

        const res = await fetch(
          `/api/assistant/history/session?sessionId=${sid}`,
        );
        const messages = await res.json();

        const win = document.getElementById("chat-window");
        win.innerHTML =
          '<p style="text-align:center; color:gray; font-size:10px;">— Conversa Antiga —</p>';

        messages.forEach((m) => {
          addMessageToChat("user", m.userMessage);
          addMessageToChat("ai", m.aiResponse);
        });
      }

      async function loadReminders() {
        const list = document.getElementById("reminders-list");
        if (!list) return;

        try {
          const response = await fetch(
            `/api/assistant/reminders?game=${selectedGame}`,
          );
          const reminders = await response.json();

          if (reminders.length === 0) {
            list.innerHTML =
              '<p style="color:gray; font-size:11px;">Nenhum lembrete salvo.</p>';
            return;
          }

          list.innerHTML = reminders
            .map(
              (r) => `
            <div style="padding: 8px; border-bottom: 1px solid #1a1b3a; font-size: 13px;">
                • ${r.reminderText}
            </div>
        `,
            )
            .join("");
        } catch (e) {
          console.error("Erro ao carregar lembretes", e);
        }
      }

      //loadSuggestions();

      loadReminders();

      loadHistory();
    </script>
  </body>
</html>
